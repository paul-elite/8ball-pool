<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>8-Ball Pool</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Geist:wght@600;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#1a2e1a;--bg-dark:#0f1f0f;--panel:#1e3a1e;--border:#2d4a2d;--text:#e4e4d0;--dim:#6a7a6a;--gold:#c8a84b;--gold-dark:#8a6a20;--accent:#4a8;--danger:#e04444;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Geist',sans-serif;overflow:hidden;user-select:none;}

/* Main Layout */
#app{display:flex;flex-direction:column;height:100vh;padding:12px;}

/* Header */
#header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;flex-shrink:0;}
.player-info{display:flex;align-items:center;gap:12px;}
.player-info.right{flex-direction:row-reverse;}
.player-info.right .player-name{text-align:right;}
.avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#6a5,#485);border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px;}
.player-name{font-size:20px;font-weight:800;letter-spacing:1px;}
.player-bar{width:120px;height:12px;background:#333;border-radius:6px;overflow:hidden;}
.player-bar-fill{height:100%;border-radius:6px;}
.player-bar-fill.p1{background:linear-gradient(90deg,#e44,#fa0,#fc0);width:70%;}
.player-bar-fill.p2{background:linear-gradient(90deg,#888,#aaa);width:100%;}
#timer{background:var(--bg-dark);padding:6px 20px;border-radius:8px;font-size:18px;font-weight:600;border:1px solid var(--border);}
.icon-btn{width:44px;height:44px;border-radius:8px;background:transparent;border:2px solid var(--border);color:var(--dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}

/* Ball Tray Row */
#ball-tray-row{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;margin-top:4px;}
.ball-tray{display:flex;gap:6px;}
.ball-slot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;}
.ball-slot.filled{border-color:transparent;}
.ball-slot.solid{background:var(--ball-color);}
.ball-slot.stripe{background:linear-gradient(180deg,#f0ece0 25%,var(--ball-color) 25%,var(--ball-color) 75%,#f0ece0 75%);}
#status-text{font-size:14px;color:var(--text);font-weight:600;text-align:center;flex:1;}

/* Game Area */
#game-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;padding:10px;}

/* Left Panel */
#left-panel{position:absolute;left:20px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;}
#left-panel .label{font-size:11px;color:var(--dim);letter-spacing:1px;margin-bottom:4px;}
.hold-btn{width:36px;height:28px;background:var(--bg-dark);border:1px solid var(--border);border-radius:4px;color:var(--dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;}
.hold-btn:hover{border-color:var(--accent);color:var(--accent);}
.hold-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Right Panel - Power Meter */
#right-panel{position:absolute;right:20px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:10px;}
#power-meter{width:28px;height:200px;background:var(--bg-dark);border:2px solid var(--border);border-radius:6px;display:flex;flex-direction:column-reverse;overflow:hidden;padding:3px;gap:2px;}
.power-segment{flex:1;border-radius:2px;background:#333;transition:background .05s;}
.power-segment.active.green{background:#4a8;}
.power-segment.active.yellow{background:#ca0;}
.power-segment.active.orange{background:#f80;}
.power-segment.active.red{background:#e44;}
#power-value{font-size:11px;color:var(--dim);}

/* Table Container */
#table-container{position:relative;}
#c{display:block;cursor:crosshair;}
#cue-overlay{position:absolute;pointer-events:none;overflow:visible;}
#potted-stack{display:none;}

/* Bottom Bar */
#bottom-bar{display:flex;align-items:center;justify-content:center;padding:12px 20px;gap:24px;}
#bottom-bar .icon-btn{width:40px;height:40px;border-radius:50%;}
#controls-label{position:absolute;right:20px;font-size:12px;color:var(--dim);display:flex;align-items:center;gap:6px;}

/* Overlay */
#ov{position:fixed;inset:0;background:rgba(15,31,15,.95);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:20px;}
#ov.h{display:none;}
#ov h2{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:5px;color:var(--gold);}
#ov p{color:var(--dim);font-size:13px;letter-spacing:1px;}
.btn{background:var(--accent);border:none;color:#fff;font-family:'Geist',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;padding:12px 28px;cursor:pointer;border-radius:6px;transition:all .15s;}
.btn:hover{background:#5b9;transform:scale(1.02);}

/* Bang Overlay */
#bang-overlay {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 90%;
  max-width: 500px;
  pointer-events: none;
  z-index: 200;
  opacity: 0;
}
@keyframes pop-bang {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  15% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  30% { transform: translate(-50%, -50%) scale(0.9); }
  45% { transform: translate(-50%, -50%) scale(1); }
  85% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
}
#bang-overlay.active {
  animation: pop-bang 0.5s ease-out forwards;
}

/* Mobile */
@media (max-height:500px){
  #app{padding:6px;}
  #header{padding:4px 10px;}
  .avatar{width:36px;height:36px;font-size:16px;}
  .player-name{font-size:16px;}
  .player-bar{width:80px;height:8px;}
  #timer{padding:4px 12px;font-size:14px;}
  #ball-tray-row{padding:4px 10px;}
  .ball-slot{width:22px;height:22px;}
  #left-panel,#right-panel{display:none;}
  #bottom-bar{padding:6px;}
}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="player-info" id="p1-info">
      <div class="avatar" id="p1-avatar">P1</div>
      <div>
        <div class="player-name" id="p1-name">Player 1</div>
        <div class="player-bar"><div class="player-bar-fill p1"></div></div>
      </div>
    </div>
    <div id="timer">00:00</div>
    <div class="player-info right" id="p2-info">
      <div class="avatar" id="p2-avatar">AI</div>
      <div>
        <div class="player-name" id="p2-name">CPU</div>
        <div class="player-bar"><div class="player-bar-fill p2"></div></div>
      </div>
    </div>
  </div>

  <div id="ball-tray-row">
    <div class="ball-tray" id="p1-balls"></div>
    <div id="status-text">Start the game</div>
    <div class="ball-tray" id="p2-balls"></div>
  </div>

  <div id="game-area">
    <div id="left-panel">
      <div class="label">HOLD</div>
      <button class="hold-btn">▲</button>
      <button class="hold-btn">▲</button>
      <button class="hold-btn">▲</button>
      <button class="hold-btn">▲</button>
      <button class="hold-btn">▲</button>
    </div>

    <div id="table-container">
      <canvas id="c"></canvas>
      <canvas id="cue-overlay"></canvas>
    </div>

    <div id="right-panel">
      <div id="power-meter"></div>
      <div id="power-value">0%</div>
    </div>
  </div>

  <div id="bottom-bar">
    <button class="icon-btn" title="Sound">🔊</button>
    <button class="icon-btn" title="Music">🎵</button>
    <button class="icon-btn" id="bng" title="New Game">🔄</button>
    <span id="controls-label">⚙ Controls</span>
  </div>
</div>

<div id="ov">
  <h2 id="ot">8-Ball Pool</h2>
  <p id="os">Click to start</p>
  <button class="btn" id="bs">Start Game</button>
</div>

<div id="bang-overlay">
  <svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="halftone" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
        <circle cx="2.5" cy="2.5" r="3" fill="#fdd835"/>
      </pattern>
      <filter id="bang-shadow">
        <feDropShadow dx="4" dy="4" stdDeviation="0" flood-color="#000" flood-opacity="1"/>
      </filter>
      <g id="white-star">
        <polygon points="0,-25 6,-8 25,-8 10,6 16,25 0,14 -16,25 -10,6 -25,-8 -6,-8" fill="#fff" stroke="#000" stroke-width="3" stroke-linejoin="round"/>
      </g>
      <style>
        .bang-text { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 170px; font-weight: 900; text-anchor: middle; }
      </style>
    </defs>
    
    <g transform="translate(250, 200)">
      <polygon points="0,-160 40,-90 140,-130 90,-40 220,-30 130,40 200,120 70,80 10,180 -60,90 -160,150 -120,40 -230,0 -110,-50 -180,-130 -60,-80" fill="#fdd835" stroke="#000" stroke-width="6" stroke-linejoin="round" filter="url(#bang-shadow)"/>
      <text x="8" y="58" class="bang-text" fill="#000" transform="rotate(-8)">BANG</text>
      <text x="-5" y="45" class="bang-text" fill="#e53935" stroke="#000" stroke-width="14" stroke-linejoin="round" transform="rotate(-8)">BANG</text>
      <text x="-5" y="45" class="bang-text" fill="#e53935" transform="rotate(-8)">BANG</text>
      <text x="-5" y="45" class="bang-text" fill="url(#halftone)" transform="rotate(-8)">BANG</text>
      <use href="#white-star" x="-150" y="-80" transform="rotate(25 -150 -80) scale(1.4)" />
      <use href="#white-star" x="120" y="-130" transform="rotate(-15 120 -130) scale(1)" />
      <use href="#white-star" x="110" y="100" transform="rotate(40 110 100) scale(1.2)" />
    </g>
  </svg>
</div>

<script>
const BALL_COLORS=['#f4c430','#1a4acc','#cc2222','#7a1aaa','#ff6600','#1a8a2a','#8a2020'];
const TW=880,TH=440,CUSHION=36,RAIL=18;
const TOTAL_W=TW+CUSHION*2+RAIL*2, TOTAL_H=TH+CUSHION*2+RAIL*2;
const BR=12, POCKET_R=22, MAX_POWER=1148;
const BAULK_X=TW*0.22, D_RADIUS=TH*0.2;
const POCKETS=[{x:0,y:0},{x:TW/2,y:-4},{x:TW,y:0},{x:0,y:TH},{x:TW/2,y:TH+4},{x:TW,y:TH}];

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const cueCanvas=document.getElementById('cue-overlay');
const cueCtx=cueCanvas.getContext('2d');

function resize(){
  const container=document.getElementById('game-area');
  const maxW=container.clientWidth-160;
  const maxH=container.clientHeight-20;
  const s=Math.min(maxW/TOTAL_W,maxH/TOTAL_H)*0.95;
  canvas.width=Math.round(TOTAL_W*s);
  canvas.height=Math.round(TOTAL_H*s);
  canvas.dataset.s=s;
  const pad=300*s;
  cueCanvas.width=canvas.width+pad*2;
  cueCanvas.height=canvas.height+pad*2;
  cueCanvas.style.left=-pad+'px';
  cueCanvas.style.top=-pad+'px';
  cueCanvas.dataset.pad=pad;
}
resize();window.addEventListener('resize',resize);
const S=()=>parseFloat(canvas.dataset.s);
const tc=(x,y)=>({x:(RAIL+CUSHION+x)*S(),y:(RAIL+CUSHION+y)*S()});
const ct=(x,y)=>({x:x/S()-RAIL-CUSHION,y:y/S()-RAIL-CUSHION});

// Physics
const P={mu_r:0.012,mu_s:0.15,e_cush:0.82,mu_cush:0.25,e_ball:0.96,mu_ball:0.04,g:1.0,R:BR,I:0.4*BR*BR,MIN_V:0.06,MIN_W:0.004,NOISE:0.00004,SUBS:8,DT:0.016};

// Game State
let balls=[],cueBall=null,uid=0;
let phase='idle',curP=0,wins=[0,0];
let allPotted=[];
let isAI=[false,true];
let aiThinking=false,aiDelay=0;
let groups=[null,null],openTable=true;
let firstHit=null,pottedShot=[];
let foulMsg='',turnMsg='',extraMsg='';
let freeBall=false,power=0,charging=false,aimAngle=0,spinX=0,spinY=0;
let gameTime=0,timerInterval=null;

// Power meter segments
const powerMeter=document.getElementById('power-meter');
for(let i=0;i<20;i++){
  const seg=document.createElement('div');
  seg.className='power-segment';
  if(i<6)seg.dataset.color='green';
  else if(i<12)seg.dataset.color='yellow';
  else if(i<16)seg.dataset.color='orange';
  else seg.dataset.color='red';
  powerMeter.appendChild(seg);
}
const powerSegs=[...powerMeter.querySelectorAll('.power-segment')];

function mkBall(type,num,cIdx,stripe,x,y){
  return{id:uid++,type,num,cIdx,stripe,x,y,vx:0,vy:0,wx:0,wy:0,wz:0,rotX:Math.random()*Math.PI*2,rotY:Math.random()*Math.PI*2,sliding:false,onTable:true,pottedBy:-1};
}

function setupGame(){
  uid=0;balls=[];pottedShot=[];firstHit=null;allPotted=[];
  groups=[null,null];openTable=true;freeBall=false;foulMsg='';
  aiThinking=false;aiDelay=0;
  cueBall=mkBall('cue',0,-1,false,BAULK_X,TH*.5);
  balls.push(cueBall);
  balls.push(mkBall('eight',8,-1,false,0,0));
  for(let i=0;i<7;i++)balls.push(mkBall('solid',i+1,i,false,0,0));
  for(let i=0;i<7;i++)balls.push(mkBall('stripe',i+9,i,true,0,0));
  rackBalls();
  phase='aiming';curP=0;
  turnMsg='Player 1 breaks';
  gameTime=0;
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{gameTime++;updateTimer();},1000);
  updateUI();updateBallTrays();
}

function rackBalls(){
  const apex={x:TW*.73,y:TH*.5},sp=BR*2+1.5,pos=[];
  for(let r=0;r<5;r++)for(let c=0;c<=r;c++)
    pos.push({x:apex.x+r*sp*Math.cos(Math.PI/6),y:apex.y-r*(sp/2)+c*sp});
  const eight=balls.find(b=>b.type==='eight');
  eight.x=pos[4].x;eight.y=pos[4].y;
  const sol=balls.filter(b=>b.type==='solid'),str=balls.filter(b=>b.type==='stripe');
  shuffle(sol);shuffle(str);
  const c1=sol.pop(),c2=str.pop();
  c1.x=pos[10].x;c1.y=pos[10].y;c2.x=pos[14].x;c2.y=pos[14].y;
  const rest=[...sol,...str];shuffle(rest);
  const slots=pos.filter((_,i)=>i!==4&&i!==10&&i!==14);
  rest.forEach((b,i)=>{b.x=slots[i].x;b.y=slots[i].y;});
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}}

function updateTimer(){
  const m=Math.floor(gameTime/60).toString().padStart(2,'0');
  const s=(gameTime%60).toString().padStart(2,'0');
  document.getElementById('timer').textContent=m+':'+s;
}

// Audio - Realistic pool sounds
let _ac=null,_lim=null;
function getAC(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();if(_ac.state==='suspended')_ac.resume();return _ac;}
function getOut(){
  const ac=getAC();
  if(!_lim){
    _lim=ac.createDynamicsCompressor();
    _lim.threshold.value=-6;_lim.knee.value=6;_lim.ratio.value=8;
    _lim.attack.value=0.002;_lim.release.value=0.1;
    _lim.connect(ac.destination);
  }
  return _lim;
}

const sfx = { cue: null, clack: null, cushion: null, pocket: null };
['cue-strike.wav', 'ball-clack.wav', 'cushion-hit.wav', 'pocket-drop.wav'].forEach((file, i) => {
  const keys = ['cue', 'clack', 'cushion', 'pocket'];
  fetch(file).then(r=>r.arrayBuffer()).then(buf=>getAC().decodeAudioData(buf)).then(decoded=>{ sfx[keys[i]] = decoded; }).catch(()=>console.log(file + ' not loaded'));
});

// Cue strike - use WAV sample
function snd_strike(pct){
  const ac=getAC();
  if(sfx.cue){
    const source=ac.createBufferSource();source.buffer=sfx.cue;
    source.playbackRate.value=0.95+pct*0.001;
    const gain=ac.createGain();gain.gain.value=0.4+pct*0.006;
    source.connect(gain);gain.connect(getOut());source.start();
  }
}

let _tc=0;
function snd_clack(imp){
  const ac=getAC(),t=ac.currentTime;
  if(t-_tc<0.015)return;_tc=t;
  if(sfx.clack){
    const source=ac.createBufferSource();source.buffer=sfx.clack;
    const gain=ac.createGain();gain.gain.value=Math.min(1.0, 0.4 + imp*0.05);
    source.connect(gain);gain.connect(getOut());source.start();
  }
}

let _tcu=0;
function snd_cushion(imp){
  const ac=getAC(),t=ac.currentTime;
  if(t-_tcu<0.025)return;_tcu=t;
  if(sfx.cushion){
    const source=ac.createBufferSource();source.buffer=sfx.cushion;
    const gain=ac.createGain();gain.gain.value=Math.min(1.0, 0.4 + imp*0.04);
    source.connect(gain);gain.connect(getOut());source.start();
  }
}

let _tp=0;
function snd_pocket(){
  const ac=getAC(),t=ac.currentTime;
  if(t-_tp<0.1)return;_tp=t;
  if(sfx.pocket){
    const source=ac.createBufferSource();source.buffer=sfx.pocket;
    const gain=ac.createGain();gain.gain.value=0.8;
    source.connect(gain);gain.connect(getOut());source.start();
  }
}

// Physics
function isMoving(){return balls.some(b=>b.onTable&&(Math.hypot(b.vx,b.vy)>P.MIN_V||Math.abs(b.wx)>P.MIN_W||Math.abs(b.wy)>P.MIN_W));}

function stepBall(b,dt){
  const spd=Math.hypot(b.vx,b.vy);
  if(spd<P.MIN_V&&!b.sliding&&Math.abs(b.wx)<P.MIN_W&&Math.abs(b.wy)<P.MIN_W){b.vx=0;b.vy=0;b.wx=0;b.wy=0;return;}
  const slip_x=b.vx-P.R*b.wy,slip_y=b.vy+P.R*b.wx,slip_s=Math.hypot(slip_x,slip_y);
  b.sliding=slip_s>P.MIN_V*.4;
  if(b.sliding){
    const inv=1/(slip_s||1),sx=slip_x*inv,sy=slip_y*inv,f=P.mu_s*P.g;
    b.vx-=sx*f*dt;b.vy-=sy*f*dt;
    b.wy+=(sx*f*P.R/P.I)*dt;b.wx-=(sy*f*P.R/P.I)*dt;
    if(Math.sign(b.vx-P.R*b.wy)!==Math.sign(slip_x))b.wy=b.vx/P.R;
    if(Math.sign(b.vy+P.R*b.wx)!==Math.sign(slip_y))b.wx=-b.vy/P.R;
  }else{
    if(spd<P.MIN_V){b.vx=0;b.vy=0;b.wx=0;b.wy=0;return;}
    const decel=P.mu_r*P.g,inv=1/spd;
    b.vx-=(b.vx*inv)*decel*dt;b.vy-=(b.vy*inv)*decel*dt;
    b.wy=b.vx/P.R;b.wx=-b.vy/P.R;
    b.vx+=(Math.random()-.5)*P.NOISE;b.vy+=(Math.random()-.5)*P.NOISE;
  }
  b.x+=b.vx*dt;b.y+=b.vy*dt;
  const rotSpeed=spd*dt/P.R;
  if(spd>P.MIN_V){const moveAng=Math.atan2(b.vy,b.vx);b.rotX+=Math.sin(moveAng)*rotSpeed;b.rotY+=Math.cos(moveAng)*rotSpeed;}
}

function resolveCushion(b,silent){
  function bounce(nx,ny){
    const vn=b.vx*nx+b.vy*ny;if(vn>=0)return;
    const tx=-ny,ty=nx,vt=b.vx*tx+b.vy*ty,vt_spin=P.R*(b.wx*ty-b.wy*tx),slip_t=vt+vt_spin;
    const J_n=(1+P.e_cush)*Math.abs(vn),max_f=P.mu_cush*J_n;
    let J_t=-slip_t/(1+P.R*P.R/P.I);J_t=Math.max(-max_f,Math.min(max_f,J_t));
    b.vx+=J_n*nx+J_t*tx;b.vy+=J_n*ny+J_t*ty;
    b.wy+=(J_t*tx*P.R)/P.I;b.wx+=(J_t*ty*P.R)/P.I;
    b.sliding=true;
    if(!silent&&Math.abs(vn)>.8)snd_cushion(Math.abs(vn));
  }
  if(b.x-P.R<0){b.x=P.R;bounce(1,0);}
  if(b.x+P.R>TW){b.x=TW-P.R;bounce(-1,0);}
  if(b.y-P.R<0){b.y=P.R;bounce(0,1);}
  if(b.y+P.R>TH){b.y=TH-P.R;bounce(0,-1);}
}

function resolveBallBall(a,b,silent){
  const dx=b.x-a.x,dy=b.y-a.y,dist=Math.hypot(dx,dy);
  if(dist>=P.R*2||dist<.001)return;
  if(firstHit===null){if(a.type==='cue')firstHit=b;else if(b.type==='cue')firstHit=a;}
  const ov=(P.R*2-dist)/2,nx=dx/dist,ny=dy/dist;
  a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;
  const dv_n=(a.vx-b.vx)*nx+(a.vy-b.vy)*ny;if(dv_n<=0)return;
  const J_n=(1+P.e_ball)*dv_n/2;
  a.vx-=J_n*nx;a.vy-=J_n*ny;b.vx+=J_n*nx;b.vy+=J_n*ny;
  const tx=-ny,ty=nx;
  const vt_a=a.vx*tx+a.vy*ty+P.R*(a.wx*ty-a.wy*tx);
  const vt_b=b.vx*tx+b.vy*ty+P.R*(b.wx*ty-b.wy*tx);
  const slip_t=vt_a-vt_b,max_t=P.mu_ball*J_n;
  const J_t=Math.max(-max_t,Math.min(max_t,slip_t/(2+2*P.R*P.R/P.I)));
  a.vx-=J_t*tx;a.vy-=J_t*ty;b.vx+=J_t*tx;b.vy+=J_t*ty;
  a.wx+=(J_t*ty*P.R)/P.I;a.wy-=(J_t*tx*P.R)/P.I;
  b.wx-=(J_t*ty*P.R)/P.I;b.wy+=(J_t*tx*P.R)/P.I;
  a.sliding=true;b.sliding=true;
  if(!silent&&Math.abs(dv_n)>.4)snd_clack(Math.abs(dv_n));
}

function step(silent){
  const dt=P.DT/P.SUBS;
  for(let sub=0;sub<P.SUBS;sub++){
    for(const b of balls){if(b.onTable)stepBall(b,dt);}
    for(const b of balls){if(b.onTable)resolveCushion(b,silent);}
    for(let pass=0;pass<2;pass++){
      for(let i=0;i<balls.length;i++){
        if(!balls[i].onTable)continue;
        for(let j=i+1;j<balls.length;j++){
          if(!balls[j].onTable)continue;
          resolveBallBall(balls[i],balls[j],silent);
        }
      }
    }
    for(const b of balls){
      if(!b.onTable)continue;
      for(const pk of POCKETS){
        if(Math.hypot(b.x-pk.x,b.y-pk.y)<POCKET_R){
          b.onTable=false;b.vx=0;b.vy=0;b.wx=0;b.wy=0;
          b.pottedBy=curP;
          pottedShot.push(b);
          if(b.type!=='cue')allPotted.push(b);
          if(!silent){
            snd_pocket();
            updateBallTrays();
            const bg = document.getElementById('bang-overlay');
            if(bg) {
              bg.classList.remove('active');
              void bg.offsetWidth;
              bg.classList.add('active');
            }
          }
          break;
        }
      }
    }
  }
}

function fastForward(){if(phase!=='rolling')return;let safety=0;while(isMoving()&&safety<5000){step(true);safety++;}phase='done';}

// Shoot
function shoot(){
  if(!cueBall||!cueBall.onTable||phase!=='aiming')return;
  const pct=power,spd=(pct/100)*MAX_POWER;
  cueBall.vx=-Math.cos(aimAngle)*spd;cueBall.vy=-Math.sin(aimAngle)*spd;
  const sc=spd*2.5/P.R;
  cueBall.wx=-spinY*sc;cueBall.wy=spinX*sc;
  cueBall.sliding=true;
  firstHit=null;pottedShot=[];
  phase='rolling';power=0;updPow();
  snd_strike(pct);
}

// Rules
const groupOf=b=>b.type==='solid'?'solid':b.type==='stripe'?'stripe':null;
const myGroup=()=>groups[curP];
const countT=t=>balls.filter(b=>b.onTable&&b.type===t).length;
const myLeft=()=>{const mg=myGroup();return mg?mg==='solid'?countT('solid'):countT('stripe'):999;};
const needEight=()=>myGroup()!==null&&myLeft()===0;

function afterShot(){
  const cuePot=pottedShot.find(b=>b.type==='cue');
  const eightPot=pottedShot.find(b=>b.type==='eight');
  const solPot=pottedShot.filter(b=>b.type==='solid');
  const strPot=pottedShot.filter(b=>b.type==='stripe');
  const anyObj=pottedShot.filter(b=>b.type!=='cue');
  let foul=false,win=false,lose=false,fR='';

  if(eightPot){
    if(openTable||myLeft()>0){lose=true;fR=`${curP===0?'Player 1':'CPU'} potted 8-ball early!`;}
    else if(cuePot){lose=true;fR='Potted 8 but scratched!';}
    else if(firstHit&&firstHit.type!=='eight'){lose=true;fR='Foul on 8-ball shot!';}
    else{win=true;fR=`${curP===0?'Player 1':'CPU'} wins!`;}
  }

  if(!win&&!lose){
    if(!firstHit){foul=true;fR='Missed all balls';}
    else{
      const fg=groupOf(firstHit),mg=myGroup();
      if(mg){
        if(needEight()&&firstHit.type!=='eight'){foul=true;fR='Must hit 8-ball';}
        else if(!needEight()&&fg&&fg!==mg){foul=true;fR='Wrong ball first';}
        else if(!needEight()&&firstHit.type==='eight'){foul=true;fR='Hit 8-ball too early';}
      }
    }
    if(cuePot){foul=true;fR=fR?fR+' + scratch':'Scratch';}

    if(!foul&&openTable&&anyObj.length>0){
      const fp=anyObj.find(b=>groupOf(b));
      if(fp){groups[curP]=groupOf(fp);groups[1-curP]=groups[curP]==='solid'?'stripe':'solid';openTable=false;}
    }

    let keep=false;
    if(!foul){
      const mg=myGroup();
      if(mg){if((mg==='solid'?solPot:strPot).length>0)keep=true;}
      else if(anyObj.some(b=>groupOf(b)))keep=true;
    }

    if(foul){
      foulMsg=fR;freeBall=true;
      cueBall.onTable=true;cueBall.vx=0;cueBall.vy=0;
      cueBall.x=BAULK_X;cueBall.y=TH*.5;
      curP=1-curP;phase='placing';
    }else{
      foulMsg='';freeBall=false;
      if(!keep)curP=1-curP;
      phase='aiming';
    }

    const mg=myGroup(),ne=needEight();
    turnMsg=`${curP===0?'Player 1':'CPU'} — ${openTable?'any ball':ne?'8-ball':mg+'s'}`;
    updateUI();updateBallTrays();return;
  }

  const winner=win?curP:1-curP;
  wins[winner]++;phase='idle';
  if(timerInterval)clearInterval(timerInterval);
  document.getElementById('ot').textContent=`${winner===0?'Player 1':'CPU'} Wins!`;
  document.getElementById('os').textContent=fR;
  document.getElementById('bs').textContent='Play Again';
  document.getElementById('ov').classList.remove('h');
  updateUI();
}

// Drawing
function lc(hex,a){const c=parseInt(hex.slice(1),16);return`rgb(${Math.min(255,(c>>16)+a)},${Math.min(255,((c>>8)&255)+a)},${Math.min(255,(c&255)+a)})`;}
function dc(hex,a){const c=parseInt(hex.slice(1),16);return`rgb(${Math.max(0,(c>>16)-a)},${Math.max(0,((c>>8)&255)-a)},${Math.max(0,(c&255)-a)})`;}

function drawTable(){
  const s=S(),W=canvas.width,H=canvas.height;
  const bx=(RAIL+CUSHION)*s,by=(RAIL+CUSHION)*s,bw=TW*s,bh=TH*s;
  const rx=RAIL*s;

  // Outer rail - golden brown
  ctx.fillStyle='#5a4020';ctx.fillRect(0,0,W,H);
  const railGrad=ctx.createLinearGradient(0,0,0,H);
  railGrad.addColorStop(0,'#8a6830');railGrad.addColorStop(0.5,'#6a4820');railGrad.addColorStop(1,'#4a3010');
  ctx.fillStyle=railGrad;ctx.fillRect(0,0,W,H);

  // Inner cushion - darker green
  ctx.fillStyle='#1a5028';
  ctx.fillRect(rx,rx,W-rx*2,H-rx*2);

  // Playing surface - bright green
  ctx.fillStyle='#2a8040';ctx.fillRect(bx,by,bw,bh);

  // Felt texture
  ctx.globalAlpha=0.15;
  for(let i=0;i<bh;i+=3){
    ctx.strokeStyle=i%6?'#1a6030':'#3a9050';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(bx,by+i);ctx.lineTo(bx+bw,by+i);ctx.stroke();
  }
  ctx.globalAlpha=1;

  // Baulk line & D
  const bl=tc(BAULK_X,0);
  ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(bl.x,by);ctx.lineTo(bl.x,by+bh);ctx.stroke();
  const dc2=tc(BAULK_X,TH*.5);
  ctx.beginPath();ctx.arc(dc2.x,dc2.y,D_RADIUS*s,Math.PI*.5,Math.PI*1.5);ctx.stroke();

  // Pockets
  POCKETS.forEach(pk=>{
    const p=tc(pk.x,pk.y),pr=POCKET_R*s;
    ctx.beginPath();ctx.arc(p.x,p.y,pr*1.3,0,Math.PI*2);
    ctx.fillStyle='#000';ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,pr,0,Math.PI*2);
    const pg=ctx.createRadialGradient(p.x-pr*.2,p.y-pr*.2,0,p.x,p.y,pr);
    pg.addColorStop(0,'#1a1a1a');pg.addColorStop(1,'#000');
    ctx.fillStyle=pg;ctx.fill();
  });
}

function drawBallAt(px,py,color,stripe,r,num,lx,ly,rotX,rotY){
  const dx=lx-px,dy=ly-py,dist=Math.hypot(dx,dy);
  const lightInt=Math.max(0.4,Math.min(1,1-dist/(canvas.width*0.7)));
  const nx=dx/(dist||1),ny=dy/(dist||1);
  const hlx=px+nx*r*0.3,hly=py+ny*r*0.3;

  // Shadow
  ctx.beginPath();ctx.arc(px+r*.15,py+r*.15,r*1.1,0,Math.PI*2);
  const sg=ctx.createRadialGradient(px+r*.15,py+r*.15,r*.3,px+r*.15,py+r*.15,r*1.1);
  sg.addColorStop(0,'rgba(0,0,0,.4)');sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sg;ctx.fill();

  ctx.save();ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.clip();

  const cosX=Math.cos(rotX),sinX=Math.sin(rotX);
  const cosY=Math.cos(rotY),sinY=Math.sin(rotY);
  // 3D sphere point projection for number position
  const surfaceZ=cosX*cosY;
  // Number position rotates with the ball in both axes
  const rawX=sinY*cosX;
  const rawY=-sinX;
  // Apply rotation to sync with stripe
  const surfaceX=(rawX*Math.cos(rotY*0.5)-rawY*Math.sin(rotY*0.5))*r*0.5;
  const surfaceY=(rawX*Math.sin(rotY*0.5)+rawY*Math.cos(rotY*0.5))*r*0.5;
  const visible=surfaceZ>0;
  const scale=0.55+surfaceZ*0.45;

  if(stripe){
    // White base
    ctx.fillStyle='#f8f4e8';ctx.fillRect(px-r,py-r,r*2,r*2);
    // Rotating stripe band - synced with ball rotation
    ctx.save();
    ctx.translate(px,py);
    // Rotate based on ball's Y rotation (rolling direction)
    ctx.rotate(rotY);
    // Calculate stripe offset based on X rotation (tilt)
    const stripeOffset=Math.sin(rotX)*r*0.5;
    // Scale stripe width based on viewing angle
    const stripeWidth=r*0.7*Math.max(0.3,Math.abs(Math.cos(rotX)));
    ctx.fillStyle=color;
    ctx.fillRect(-r*1.2,stripeOffset-stripeWidth/2,r*2.4,stripeWidth);
    ctx.restore();
  }else{
    const g=ctx.createRadialGradient(hlx,hly,r*.05,px,py,r);
    g.addColorStop(0,lc(color,60));g.addColorStop(.5,color);g.addColorStop(1,dc(color,40));
    ctx.fillStyle=g;ctx.fillRect(px-r,py-r,r*2,r*2);
  }

  // Highlight
  const hlAlpha=0.2+0.2*lightInt;
  const glow=ctx.createRadialGradient(hlx,hly,0,hlx,hly,r*.35);
  glow.addColorStop(0,`rgba(255,250,200,${hlAlpha})`);
  glow.addColorStop(0.5,`rgba(255,240,180,${hlAlpha*.5})`);
  glow.addColorStop(1,'rgba(255,230,150,0)');
  ctx.beginPath();ctx.arc(hlx,hly,r*.35,0,Math.PI*2);
  ctx.fillStyle=glow;ctx.fill();
  ctx.restore();

  // Number
  if(num>0&&visible){
    const numX=px+surfaceX,numY=py+surfaceY;
    const fs=Math.max(8,Math.round(r*.85*scale));
    const circleR=r*.38*scale;
    const alpha=Math.min(1,surfaceZ*1.4);
    ctx.beginPath();ctx.arc(numX,numY,circleR,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${alpha*.9})`;ctx.fill();
    ctx.font=`800 ${fs}px "Geist",sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=`rgba(0,0,0,${alpha})`;
    ctx.fillText(num,numX,numY);
  }

  ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1;ctx.stroke();
}

function drawAllBalls(){
  const s=S(),r=BR*s;
  const bx=(RAIL+CUSHION)*s,by=(RAIL+CUSHION)*s,bw=TW*s,bh=TH*s;
  const lampX=bx+bw*.5,lampY=by+bh*.35;
  for(const b of balls){
    if(!b.onTable)continue;
    const p=tc(b.x,b.y);
    const col=b.type==='cue'?'#f5f0e8':b.type==='eight'?'#111':BALL_COLORS[b.cIdx];
    drawBallAt(p.x,p.y,col,b.stripe,r,b.num,lampX,lampY,b.rotX||0,b.rotY||0);
  }
}

function drawCue(){
  const pad=parseFloat(cueCanvas.dataset.pad)||0;
  cueCtx.clearRect(0,0,cueCanvas.width,cueCanvas.height);
  if(phase!=='aiming'||!cueBall||!cueBall.onTable)return;
  const s=S(),p=tc(cueBall.x,cueBall.y);
  const ox=p.x+pad,oy=p.y+pad;
  const pull=(8+(power/100)*50)*s,cueLen=200*s;
  const dx=Math.cos(aimAngle),dy=Math.sin(aimAngle);

  // Aiming line
  cueCtx.setLineDash([6*s,8*s]);
  cueCtx.strokeStyle='rgba(255,255,255,.2)';cueCtx.lineWidth=1.5;
  cueCtx.beginPath();cueCtx.moveTo(ox-dx*BR*s,oy-dy*BR*s);cueCtx.lineTo(ox-dx*400*s,oy-dy*400*s);cueCtx.stroke();
  cueCtx.setLineDash([]);

  // Cue stick
  const tx=ox+dx*(BR*s+pull),ty=oy+dy*(BR*s+pull);
  const bx=tx+dx*cueLen,by=ty+dy*cueLen;
  const g=cueCtx.createLinearGradient(tx,ty,bx,by);
  g.addColorStop(0,'#f0e8d0');g.addColorStop(.1,'#c8a060');g.addColorStop(.7,'#6a3a18');g.addColorStop(1,'#3a1a08');
  cueCtx.beginPath();cueCtx.moveTo(tx,ty);cueCtx.lineTo(bx,by);
  cueCtx.strokeStyle=g;cueCtx.lineWidth=4*s;cueCtx.lineCap='round';cueCtx.stroke();
  cueCtx.beginPath();cueCtx.arc(tx,ty,2.5*s,0,Math.PI*2);cueCtx.fillStyle='#5090b0';cueCtx.fill();
}

function drawPlacing(){
  if(phase!=='placing'||!cueBall)return;
  const s=S(),r=BR*s,p=tc(cueBall.x,cueBall.y);
  ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
}

// UI
function updateUI(){
  document.getElementById('status-text').textContent=foulMsg||turnMsg;
  document.getElementById('p1-info').style.opacity=curP===0?'1':'0.5';
  document.getElementById('p2-info').style.opacity=curP===1?'1':'0.5';
}

function updPow(){
  const pct=Math.round(power);
  document.getElementById('power-value').textContent=pct+'%';
  const activeCount=Math.round(pct/5);
  powerSegs.forEach((seg,i)=>{
    if(i<activeCount){
      seg.classList.add('active',seg.dataset.color);

      seg.classList.remove('active','green','yellow','orange','red');

function updateBallTrays(){

    if(potted){
      slot.classList.add(potted.stripe?'stripe':'solid');
      slot.style.setProperty('--ball-color',BALL_COLORS[potted.cIdx]);
      slot.textContent=potted.num;
      slot.dataset.num=potted.num;
    }
    p2Tray.appendChild(slot);
  }
}

// Input
function handlePointerMove(sx,sy){
  if(phase==='aiming'&&cueBall&&cueBall.onTable){
    const p=tc(cueBall.x,cueBall.y);aimAngle=Math.atan2(sy-p.y,sx-p.x);
  }
  if(phase==='placing'&&cueBall){
    const t=ct(sx,sy);
    if(freeBall){cueBall.x=Math.max(BR,Math.min(TW-BR,t.x));cueBall.y=Math.max(BR,Math.min(TH-BR,t.y));}
    else{
      let tx=Math.min(t.x,BAULK_X),ty=Math.max(BR,Math.min(TH-BR,t.y));
      const dist=Math.hypot(tx-BAULK_X,ty-TH*.5);
      if(dist>D_RADIUS-BR){const a=Math.atan2(ty-TH*.5,tx-BAULK_X);tx=BAULK_X+Math.cos(a)*(D_RADIUS-BR);ty=TH*.5+Math.sin(a)*(D_RADIUS-BR);}
      cueBall.x=Math.max(BR,Math.min(BAULK_X,tx));cueBall.y=ty;
    }
  }
}
function handlePointerDown(){
  getAC();
  if(phase==='rolling'){fastForward();return;}
  if(phase==='aiming'&&!isAI[curP])charging=true;
  if(phase==='placing'&&!isAI[curP]){
    phase='aiming';foulMsg='';
    const mg=myGroup(),ne=needEight();
    turnMsg=`Player 1 — ${openTable?'any ball':ne?'8-ball':mg+'s'}`;
    updateUI();
  }
}
function handlePointerUp(){if(charging){charging=false;shoot();}}

canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();handlePointerMove(e.clientX-r.left,e.clientY-r.top);});
canvas.addEventListener('mousedown',handlePointerDown);
canvas.addEventListener('mouseup',handlePointerUp);
canvas.addEventListener('mouseleave',handlePointerUp);
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0],r=canvas.getBoundingClientRect();handlePointerMove(t.clientX-r.left,t.clientY-r.top);handlePointerDown();},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],r=canvas.getBoundingClientRect();handlePointerMove(t.clientX-r.left,t.clientY-r.top);},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();handlePointerUp();},{passive:false});

function chargePwr(){if(!charging)return;power=Math.min(100,power+1.8);updPow();}

// AI (simplified for brevity)
function getValidTargets(){
  const mg=myGroup();
  if(needEight())return balls.filter(b=>b.onTable&&b.type==='eight');
  if(mg==='solid')return balls.filter(b=>b.onTable&&b.type==='solid');
  if(mg==='stripe')return balls.filter(b=>b.onTable&&b.type==='stripe');
  return balls.filter(b=>b.onTable&&b.type!=='cue'&&b.type!=='eight');
}

function lineHitsBall(x1,y1,x2,y2,ignore){
  const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);if(len<1)return null;
  const nx=dx/len,ny=dy/len;
  for(const b of balls){
    if(!b.onTable||b===ignore||b===cueBall)continue;
    const px=b.x-x1,py=b.y-y1,proj=px*nx+py*ny;
    if(proj<0||proj>len)continue;
    if(Math.hypot(px-proj*nx,py-proj*ny)<BR*2)return b;
  }
  return null;
}

function findBestShot(){
  const targets=getValidTargets();let best=null;
  for(const t of targets){
    for(const pk of POCKETS){
      const dx=pk.x-t.x,dy=pk.y-t.y,distPk=Math.hypot(dx,dy);
      const angPk=Math.atan2(dy,dx);
      const ghostX=t.x-Math.cos(angPk)*BR*2,ghostY=t.y-Math.sin(angPk)*BR*2;
      const distCue=Math.hypot(ghostX-cueBall.x,ghostY-cueBall.y);
      if(distCue<BR*2.5)continue;
      if(lineHitsBall(cueBall.x,cueBall.y,ghostX,ghostY,t))continue;
      if(lineHitsBall(t.x,t.y,pk.x,pk.y,t))continue;
      const cueAng=Math.atan2(ghostY-cueBall.y,ghostX-cueBall.x);
      const cutAngle=Math.abs(angPk-cueAng);
      if(cutAngle>Math.PI*.6)continue;
      const score=800-distPk*0.4-distCue*0.3-cutAngle*100;
      const pwr=Math.min(85,30+distCue*0.08+distPk*0.05);
      if(!best||score>best.score)best={angle:cueAng,power:pwr,score};
    }
  }
  if(!best&&targets.length>0){
    const t=targets[0];
    best={angle:Math.atan2(t.y-cueBall.y,t.x-cueBall.x),power:45,score:0};
  }
  return best;
}

function aiTakeTurn(){
  if(phase==='placing'){
    cueBall.x=BAULK_X;cueBall.y=TH*.5;
    phase='aiming';foulMsg='';turnMsg='CPU thinking...';updateUI();
    aiDelay=20;aiThinking=true;return;
  }
  const shot=findBestShot();
  if(shot){aimAngle=shot.angle;power=shot.power;updPow();shoot();}
  else{aimAngle=Math.random()*Math.PI*2;power=40;updPow();shoot();}
  aiThinking=false;
}

function aiUpdate(){
  if(!isAI[curP]||phase==='rolling'||phase==='done'||phase==='idle')return;
  if(aiThinking){aiDelay--;if(aiDelay<=0)aiTakeTurn();}
  else if(phase==='aiming'||phase==='placing'){aiThinking=true;aiDelay=30;turnMsg='CPU thinking...';updateUI();}
}

// Loop
function loop(){
  requestAnimationFrame(loop);
  chargePwr();aiUpdate();
  if(phase==='rolling'){for(let i=0;i<8;i++){step();if(!isMoving())break;}if(!isMoving())phase='done';}
  else if(phase==='done'){afterShot();}
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawTable();drawAllBalls();drawCue();drawPlacing();
}

// Init
function startGame(){setupGame();document.getElementById('ov').classList.add('h');}
document.getElementById('bs').addEventListener('click',startGame);
document.getElementById('bng').addEventListener('click',startGame);

loop();
</script>
